name: golorry_customer_app
description: "GoLorry Customer App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 Firebase (same versions as driver app)
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.5

  # Maps & Location
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0

  # Network
  http: ^1.2.1

  # Fonts
  google_fonts: ^6.2.1

  # Local storage
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true