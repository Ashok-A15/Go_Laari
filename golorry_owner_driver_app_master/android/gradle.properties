# Reduced memory settings for low-RAM machines (~6GB available RAM)
# Original settings (-Xmx8G -XX:MaxMetaspaceSize=4G) required ~12GB and caused OOM crash
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=false
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
kotlin.daemon.jvmargs=-Xmx1500m -XX:MaxMetaspaceSize=384m
