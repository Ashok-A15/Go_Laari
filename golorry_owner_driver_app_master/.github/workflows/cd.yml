name: CD — Release Build & Deploy

on:
  push:
    tags:
      - "v*.*.*"       # triggers on version tags like v1.0.0
  workflow_dispatch:   # allows manual trigger from GitHub UI
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.24.5"

jobs:
  # ─────────────────────────────────────────
  # 1. Build Release APK & AAB
  # ─────────────────────────────────────────
  build-release-android:
    name: Build Release Android
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ── Firebase: decode google-services.json ──────────────────────────────
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json

      # ── Android Keystore: decode & set up signing ──────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      # ── Upload build artifacts ─────────────────────────────────────────────
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.ref_name }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ─────────────────────────────────────────
  # 2. Create GitHub Release
  # ─────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release-android
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: release-artifacts/

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab-${{ github.ref_name }}
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Laari ${{ github.ref_name }}"
          body: |
            ## What's New in ${{ github.ref_name }}
            
            > Update this release body with changelog details.
            
            ### Downloads
            - `app-release.apk` — Install directly on Android devices
            - `app-release.aab` — Upload to Google Play Store
            
            ### Build Info
            - Flutter: ${{ env.FLUTTER_VERSION }}
            - Commit: ${{ github.sha }}
          files: |
            release-artifacts/app-release.apk
            release-artifacts/app-release.aab
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

  # ─────────────────────────────────────────
  # 3. Deploy to Firebase App Distribution
  #    (Staging / QA Testers)
  # ─────────────────────────────────────────
  firebase-app-distribution:
    name: Firebase App Distribution
    runs-on: ubuntu-latest
    needs: build-release-android
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: release-artifacts/

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: release-artifacts/app-release.apk
          releaseNotes: |
            Release ${{ github.ref_name }}
            Commit: ${{ github.sha }}
